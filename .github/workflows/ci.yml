name: ci
on:
  push:
    branches: [main, feat/codegen-260718]
  pull_request:
    branches: [main, docs/arch-design-260717]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1
